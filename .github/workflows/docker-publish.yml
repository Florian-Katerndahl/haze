name: Build and Publish Docker Images

on:
  push:
    branches: [ "development" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "development" ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: haze

jobs:
  release-build:
    environment:
      name: docker
      deployment: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enabled={{is_default_branch}}
          labels: |
            org.opencontainers.image.authors=Florian Katerndahl <florian@katerndahl.com>
            org.opencontainers.image.title=haze
            org.opencontainers.image.description=haze aims to be a drop-in replacement for water vapor processing of ERA-5 datasets to be used with FORCE.
            org.opencontainers.image.documentation=https://www.katerndahl.net/haze/
      
      - name: Login to registry
        uses: docker/login-action@v4
        if: github.repository == 'Florian-Katerndahl/haze' && github.event != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push release Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/release.dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true